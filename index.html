<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenya Online Jobs Finder</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    margin: 0;
    padding: 0;
  }
  h1 {
    text-align: center;
    color: #333;
    margin-top: 30px;
  }

  /* Modal styles */
  #modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  #modalContent {
    background: #fff;
    padding: 30px;
    max-width: 500px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  }
  #modalContent p {
    font-size: 16px;
    color: #900;
    margin-bottom: 20px;
  }
  #modalContent button {
    background: #007BFF;
    color: #fff;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
  }
  #modalContent button:hover {
    background: #0056b3;
  }

  /* Jobs container */
  #jobs {
    max-width: 900px;
    margin: 30px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  /* Job card */
  .job {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .job:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }
  .job h3 {
    color: #007BFF;
    margin-top: 0;
  }
  .job p {
    margin: 5px 0;
    color: #555;
  }
  .job a {
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    color: #fff;
    background: #28a745;
    padding: 10px 15px;
    border-radius: 5px;
    transition: background 0.2s;
  }
  .job a:hover {
    background: #218838;
  }
  .job .warning {
    color: red;
    font-weight: bold;
  }

</style>
</head>
<body>

<h1>Online Jobs Available for Kenya</h1>

<!-- Modal for safety precaution -->
<div id="modal">
  <div id="modalContent">
    <p>⚠️ Warning: Do not pay money for any job application. Legitimate jobs never ask for fees or verification codes that never arrive. Stay safe and avoid scams!</p>
    <button onclick="closeModal()">I Understand</button>
  </div>
</div>

<!-- Jobs container -->
<div id="jobs">Loading jobs...</div>

<script>
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// Fetch jobs from RemoteOK API
async function fetchJobs() {
  try {
    const response = await fetch('https://remoteok.com/api');
    const data = await response.json();

    const jobsContainer = document.getElementById('jobs');
    jobsContainer.innerHTML = ''; // Clear loading text

    data.forEach(job => {
      if ((job.countries && job.countries.includes("Kenya")) || job.remote) {

        // Flag suspicious jobs
        let warningText = '';
        if (job.description && /pay|money|fee|code/i.test(job.description)) {
          warningText = '<p class="warning">Potential scam: Check carefully before applying!</p>';
        }

        const jobDiv = document.createElement('div');
        jobDiv.className = 'job';
        jobDiv.innerHTML = `
          <h3>${job.position}</h3>
          <p>Company: ${job.company}</p>
          <p>Location: ${job.location || 'Remote'}</p>
          ${warningText}
          <a href="${job.url}" target="_blank">Apply Now</a>
        `;
        jobsContainer.appendChild(jobDiv);
      }
    });

  } catch (error) {
    document.getElementById('jobs').innerHTML = 'Failed to load jobs. Try again later.';
    console.error(error);
  }
}

// Load jobs when page is ready
fetchJobs();
</script>

</body>
</html>
